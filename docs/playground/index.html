    <style>
      body {
        background-color: #050505;
        color: #e5e5e5;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* GLOBAL PERFORMANCE FX CLASSES */
      .fx-shake { animation: shake 0.15s infinite; }
      .fx-invert { filter: invert(1) hue-rotate(180deg) !important; }
      .fx-glitch { animation: glitch-anim 0.2s infinite; filter: contrast(200%) brightness(150%); }
      .fx-rgb { text-shadow: 2px 0 red, -2px 0 blue; filter: saturate(300%); }
      .fx-zoom { transform: scale(1.05); transition: transform 0.1s ease-out; }
      
      @keyframes shake {
        0% { transform: translate(2px, 1px) rotate(0deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        40% { transform: translate(1px, -1px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        80% { transform: translate(1px, 1px) rotate(1deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
      }

      @keyframes glitch-anim {
        0% { clip-path: inset(10% 0 30% 0); transform: translate(-5px, 0); }
        20% { clip-path: inset(40% 0 10% 0); transform: translate(5px, 0); }
        40% { clip-path: inset(60% 0 5% 0); transform: translate(-5px, 0); }
        60% { clip-path: inset(10% 0 70% 0); transform: translate(5px, 0); }
        80% { clip-path: inset(30% 0 20% 0); transform: translate(-5px, 0); }
        100% { clip-path: inset(10% 0 30% 0); transform: translate(0, 0); }
      }

      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #1a1a1a; }
      ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      
      .dj-fader-vertical {
        -webkit-appearance: none;
        width: 180px;
        height: 6px;
        background: #1a1a1a;
        outline: none;
        transform: rotate(-90deg);
        cursor: pointer;
        border-radius: 10px;
        position: absolute;
        top: 50%;
        left: 50%;
        margin-left: -90px;
      }
      .dj-fader-vertical::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 24px;
        height: 48px;
        background: #00f3ff;
        border: 2px solid #fff;
        border-radius: 4px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
      }

      .glass-panel { background: rgba(30, 30, 30, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
      
      @keyframes scan-line {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .animate-scan-line {
        animation: scan-line 2s infinite linear;
      }
