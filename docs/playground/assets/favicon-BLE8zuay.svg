<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glowing gradients -->
    <radialGradient id="disc-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="70%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff"/>
      <stop offset="50%" stop-color="#b026ff"/>
      <stop offset="100%" stop-color="#00ff41"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="128" fill="#09090b"/>

  <!-- Stylized vinyl edge -->
  <circle cx="256" cy="256" r="180" fill="url(#disc-grad)" stroke="#27272a" stroke-width="6"/>

  <!-- Soundwave tracks / Groove lines -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="40 10 90 20 50 15"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#27272a" stroke-width="2" stroke-dasharray="60 30 140 40"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#3f3f46" stroke-width="1" stroke-dasharray="20 10 30 10"/>

  <!-- Neon Glowing Core (audio wave bars) -->
  <g filter="url(#glow)" stroke="url(#neon-grad)" stroke-width="6" stroke-linecap="round">
    <!-- Centered circular wave pattern -->
    <line x1="256" y1="176" x2="256" y2="156" />
    <line x1="256" y1="336" x2="256" y2="356" />
    <line x1="176" y1="256" x2="156" y2="256" />
    <line x1="336" y1="256" x2="356" y2="256" />

    <line x1="199" y1="199" x2="185" y2="185" />
    <line x1="313" y1="313" x2="327" y2="327" />
    <line x1="199" y1="313" x2="185" y2="327" />
    <line x1="313" y1="199" x2="327" y2="185" />
  </g>

  <!-- Center Label -->
  <circle cx="256" cy="256" r="50" fill="#09090b" stroke="url(#neon-grad)" stroke-width="3"/>
  
  <!-- Stylized 'O' (OIIA) Letter in Center -->
  <text x="256" y="271" font-family="'Inter', sans-serif" font-weight="900" font-size="46" fill="#ffffff" text-anchor="middle" letter-spacing="-1">O</text>
</svg>
